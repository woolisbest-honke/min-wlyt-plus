<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>プレイ中 — Min-WLYT-Plus Games</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f1724, #071029);
      --accent: #00d4ff;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --muted: #9fb7c9;
      --text: #e6f7ff;
      --live: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh; overflow: hidden; color: var(--text);
      font-family: Inter, "Noto Sans JP", sans-serif; background: #000;
    }
    
    /* レイアウト構造 */
    .layout { display: flex; flex-direction: column; height: 100%; position: relative; }
    
    /* トップバー（自動非表示対応） */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px; padding: 10px 18px;
      background: rgba(7, 16, 41, 0.9); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px); z-index: 100;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hide-ui .topbar { transform: translateY(-100%); }
    .hide-ui .side-toggle { transform: translateY(-50%) translateX(100%); opacity: 0; }

    /* ====== 追加：トップバー引き出し用ツマミ & ホバー検知エリア ====== */
    .topbar-trigger {
      position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
      width: 60px; height: 24px;
      background: rgba(7, 16, 41, 0.9); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 12px 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 110; backdrop-filter: blur(10px);
      transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
      color: var(--muted); opacity: 0; pointer-events: none;
    }
    .hide-ui .topbar-trigger { top: 0; opacity: 1; pointer-events: auto; }
    .topbar-trigger:hover { color: var(--accent); background: rgba(0,212,255,0.1); }
    .topbar-trigger svg { width: 16px; height: 16px; }

    .hover-area {
      position: absolute; top: 0; left: 0; right: 0; height: 15px; z-index: 105;
      pointer-events: none;
    }
    .hide-ui .hover-area { pointer-events: auto; }
    /* ========================================================= */

    .back-btn, .action-btn, .panel-close {
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted);
      text-decoration: none; padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--glass); cursor: pointer; transition: .18s;
      font-size: 14px;
    }
    .back-btn:hover, .action-btn:hover { color: var(--accent); background: rgba(0,212,255,0.07); border-color: var(--accent); }
    
    .divider { width: 1px; height: 24px; background: var(--border); }
    .game-info { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .game-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .live-badge {
      display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px;
      background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--live); font-size: 12px; font-weight: 700;
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--live); position: relative; box-shadow: 0 0 10px var(--live); }
    .live-dot::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: var(--live); animation: ping 2s infinite; }
    @keyframes ping { 0% { transform: scale(1); opacity: 0.6 } 70%,100% { transform: scale(2.4); opacity: 0 } }

    /* フレームコンテナ */
    .frame-wrap { flex: 1; position: relative; background: #000; width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ロード・エラー */
    .overlay {
      position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; background: #071029; transition: .4s;
    }
    .hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,212,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg) } }
    
    /* サイドパネル */
    .side-toggle {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%); width: 28px; height: 64px;
      background: rgba(7,16,41,0.8); border: 1px solid var(--border); border-right: none;
      border-radius: 8px 0 0 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 200; backdrop-filter: blur(8px); transition: 0.4s;
    }
    .side-panel {
      position: fixed; right: -320px; top: 0; bottom: 0; width: 320px;
      background: rgba(7, 16, 41, 0.95); border-left: 1px solid var(--border);
      backdrop-filter: blur(20px); z-index: 210; transition: .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    .side-panel.open { right: 0; }
    .panel-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .info-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
    .tag { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: rgba(0,212,255,0.1); color: var(--accent); margin: 2px; display: inline-block; }
    
    svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    /* 全画面時のUI調整 */
    :fullscreen .topbar { background: rgba(7, 16, 41, 0.7); }

    @media(max-width:600px) { .game-sub, .live-badge span, .side-toggle { display: none; } }
  </style>
</head>
<body>

  <div class="layout" id="layout">
    <!-- UI引き出し用 -->
    <div class="hover-area" id="hoverArea"></div>
    <div class="topbar-trigger" id="topbarTrigger">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <!-- トップバー -->
    <header class="topbar" id="topbar">
      <a href="game.html" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>一覧
      </a>
      <div class="divider"></div>
      <div class="game-info">
        <span id="gameEmoji" style="font-size:20px">🎮</span>
        <div style="min-width:0">
          <div class="game-name" id="gameName">読み込み中…</div>
          <div class="game-sub" style="font-size:11px;color:var(--muted)">MIN-Tube-Pro Games</div>
        </div>
      </div>

      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="onlineCount">1</span><span style="margin-left:4px">Users</span>
      </div>

      <button class="action-btn" id="reloadBtn" title="リロード">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="action-btn" id="fsBtn" title="全画面">
        <svg id="fsIcon" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </button>
    </header>

    <!-- メインコンテンツ -->
    <main class="frame-wrap" id="fullscreenTarget">
      <!-- ロード画面 -->
      <div class="overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingMsg" style="font-size:14px;color:var(--muted)">準備中...</div>
      </div>
      
      <!-- エラー画面 -->
      <div class="overlay hidden" id="errorOverlay">
        <div style="font-size:48px">⚠️</div>
        <div id="errorMsg" style="margin-top:10px">ゲームが見つかりません</div>
        <button class="back-btn" style="margin-top:20px" onclick="location.reload()">再試行</button>
      </div>

      <iframe id="gameFrame" allow="autoplay; fullscreen; keyboard-lock; pointer-lock" allowfullscreen></iframe>
    </main>

    <!-- サイドトグル（UI自動表示対象） -->
    <div class="side-toggle" id="sideToggle">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    </div>
  </div>

  <!-- サイドパネル -->
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header">
      <b style="font-size: 16px;">ゲーム情報</b>
      <button class="panel-close" id="panelClose">✕</button>
    </div>
    <div class="panel-body" id="panelBody">
      <!-- JSで挿入 -->
    </div>
  </aside>

  <script>
    const SUPABASE_URL = 'https://vddbnttozxrvhjyzqgps.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkZGJudHRvenhydmhqeXpxZ3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDczMjgsImV4cCI6MjA5NDg4MzMyOH0.XgN7PLFpstChezT_uoE06D3I4Yki6zMnKsI245smyPQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const gameKey = params.get('game') || '';
    const uid = (() => {
      let id = localStorage.getItem('min_tube_uid');
      if(!id) { id = crypto.randomUUID(); localStorage.setItem('min_tube_uid', id); }
      return id;
    })();

    let uiTimer;
    const UI = {
      layout: $('layout'),
      topbar: $('topbar'),
      frame: $('gameFrame'),
      panel: $('sidePanel')
    };

    // 1. UI自動非表示ロジック
    const showUI = () => {
      UI.layout.classList.remove('hide-ui');
      clearTimeout(uiTimer);
      uiTimer = setTimeout(() => {
        // パネルが開いておらず、かつマウスが上部バーにない場合に隠す
        if (!UI.panel.classList.contains('open') && !UI.topbar.matches(':hover')) {
          UI.layout.classList.add('hide-ui');
        }
      }, 3000);
    };

    window.addEventListener('mousemove', showUI);
    window.addEventListener('touchstart', showUI);

    // ★追加: iframe操作中でも上のバーを呼び出しやすくするためのイベント
    $('topbarTrigger').addEventListener('mouseenter', showUI);
    $('topbarTrigger').addEventListener('click', showUI);
    $('hoverArea').addEventListener('mouseenter', showUI);
    $('hoverArea').addEventListener('touchstart', showUI, { passive: true });

    // 2. プレゼンス設定
    function setupPresence() {
      const channel = supabaseClient.channel('global-presence', {
        config: { presence: { key: uid } }
      });

      channel
        .on('presence', { event: 'sync' }, () => {
          const state = channel.presenceState();
          $('onlineCount').innerText = Object.keys(state).length;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await channel.track({ online_at: new Date().toISOString(), playing: gameKey });
          }
        });
    }

    // 3. ゲーム読み込み
    async function init() {
      try {
        const res = await fetch('games.json');
        const games = await res.json();
        const game = games.find(g => g.key === gameKey);

        if (!game) throw new Error('Game not found');

        document.title = `${game.name} — MIN-Tube-Pro`;
        $('gameName').textContent = game.name;
        $('gameEmoji').textContent = game.emoji;
        $('loadingMsg').textContent = `${game.name} を読み込み中...`;

        $('panelBody').innerHTML = `
          <div><div class="info-label">説明</div><div style="font-size:14px;line-height:1.6;color:var(--muted)">${game.desc}</div></div>
          <div><div class="info-label">ジャンル</div><span class="tag">${game.genreLabel}</span></div>
          <div><div class="info-label">タグ</div><div>${game.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div></div>
        `;

        UI.frame.onload = () => { $('loadingOverlay').classList.add('hidden'); };
        UI.frame.src = game.file;

        setupPresence();
      } catch (err) {
        $('loadingOverlay').classList.add('hidden');
        $('errorOverlay').classList.remove('hidden');
        console.error(err);
      }
    }

    // 4. 全画面ロジック
    const fsBtn = $('fsBtn');
    fsBtn.onclick = () => {
      if (!document.fullscreenElement) {
        if (UI.layout.requestFullscreen) UI.layout.requestFullscreen();
        else if (UI.layout.webkitRequestFullscreen) UI.layout.webkitRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    };

    document.onfullscreenchange = () => {
      const isFS = !!document.fullscreenElement;
      const icon = $('fsIcon');
      if (isFS) {
        icon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
      } else {
        icon.innerHTML = '<path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>';
      }
    };

    // 5. その他のイベント
    $('reloadBtn').onclick = () => { UI.frame.src = UI.frame.src; $('loadingOverlay').classList.remove('hidden'); };
    $('sideToggle').onclick = () => { UI.panel.classList.add('open'); showUI(); };
    $('panelClose').onclick = () => { UI.panel.classList.remove('open'); };

    init();
    showUI();
  </script>
</body>
</html>
