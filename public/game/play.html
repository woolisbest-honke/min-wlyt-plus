<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>プレイ中 — MIN-Tube-Pro Games</title>
  <!-- Supabase SDK 追加 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f1724, #071029);
      --accent: #00d4ff;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --muted: #9fb7c9;
      --text: #e6f7ff;
      --live: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh; overflow: hidden; color: var(--text);
      font-family: Inter, "Noto Sans JP", sans-serif; background: var(--bg);
    }
    .layout { display: flex; flex-direction: column; height: 100%; position: relative; }
    
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px; padding: 10px 18px;
      background: rgba(7, 16, 41, 0.9); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px); z-index: 100;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hide-ui .topbar { transform: translateY(-100%); }

    .back-btn, .action-btn, .panel-close {
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted);
      text-decoration: none; padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--glass); cursor: pointer; transition: .18s;
    }
    .back-btn:hover, .action-btn:hover { color: var(--accent); background: rgba(0,212,255,0.07); }
    .divider { width: 1px; height: 24px; background: var(--border); }
    .game-info { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .game-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* LIVEバッジの装飾 */
    .live-badge {
      display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px;
      background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--live); font-size: 12px; font-weight: 700;
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--live); position: relative; box-shadow: 0 0 10px var(--live); }
    .live-dot::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: var(--live); animation: ping 2s infinite; }
    @keyframes ping { 0% { transform: scale(1); opacity: 0.6 } 70%,100% { transform: scale(2.4); opacity: 0 } }

    .frame-wrap { flex: 1; position: relative; background: #000; width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }

    .loading, .error-screen {
      position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; background: var(--bg); transition: .4s;
    }
    .hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,212,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg) } }
    
    .error-screen { display: none; text-align: center; padding: 20px; }
    .error-screen.show { display: flex; }
    .retry-btn { padding: 10px 22px; border-radius: 10px; border: none; font-weight: 600; background: linear-gradient(135deg, var(--accent), #6a00ff); color: #fff; cursor: pointer; }

    .side-toggle {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%); width: 28px; height: 64px;
      background: rgba(7,16,41,0.8); border: 1px solid var(--border); border-right: none;
      border-radius: 8px 0 0 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 200; backdrop-filter: blur(8px); transition: 0.4s;
    }
    .side-panel {
      position: fixed; right: -300px; top: 0; bottom: 0; width: 300px;
      background: rgba(7, 16, 41, 0.95); border-left: 1px solid var(--border);
      backdrop-filter: blur(16px); z-index: 199; transition: .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .side-panel.open { right: 0; }
    .panel-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .info-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .tag { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: rgba(0,212,255,0.1); color: var(--accent); margin: 2px; display: inline-block; }
    
    .is-fullscreen .topbar, .is-fullscreen .side-toggle { display: none !important; }
    svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    @media(max-width:600px) { .game-sub, .live-badge span, .side-toggle, .side-panel { display: none; } }
  </style>
</head>
<body>
  <div class="layout" id="layout">
    <header class="topbar" id="topbar">
      <a href="game.html" class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>一覧</a>
      <div class="divider"></div>
      <div class="game-info">
        <span id="gameEmoji" style="font-size:20px">🎮</span>
        <div style="min-width:0">
          <div class="game-name" id="gameName">読み込み中…</div>
          <div class="game-sub" style="font-size:11px;color:var(--muted)">MIN-Tube-Pro Games</div>
        </div>
      </div>

      <!-- 同時接続数表示エリア -->
      <div class="live-badge" id="liveBadge">
        <div class="live-dot"></div>
        <span id="onlineCount">1</span> users
      </div>

      <button class="action-btn" id="reloadBtn"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>リロード</button>
      <button class="action-btn" id="fsBtn"><svg viewBox="0 0 24 24" id="fsIcon"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>全画面</button>
    </header>

    <main class="frame-wrap">
      <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
        <div id="loadingGameName" style="font-size:14px;color:var(--muted)"></div>
      </div>
      <div class="error-screen" id="errorScreen">
        <div style="font-size:48px">⚠️</div>
        <div id="errorMsg" style="margin-bottom:10px">ゲームが見つかりません。</div>
        <button class="retry-btn" id="retryBtn">再試行</button>
      </div>
      <iframe id="gameFrame" allowfullscreen></iframe>
    </main>
  </div>

  <div class="side-toggle" id="sideToggle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div>
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header"><b>ゲーム情報</b><div class="panel-close" id="panelClose">✕</div></div>
    <div class="panel-body" id="panelBody"></div>
  </aside>

  <script>
    // ── 1. Supabase設定（一覧画面と同じもの） ──
    const SUPABASE_URL = 'https://vddbnttozxrvhjyzqgps.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkZGJudHRvenhydmhqeXpxZ3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDczMjgsImV4cCI6MjA5NDg4MzMyOH0.XgN7PLFpstChezT_uoE06D3I4Yki6zMnKsI245smyPQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const gameKey = params.get('game') || '';
    let currentGame = null;
    let uiTimer;

    // UUID取得（一覧画面と共通にすることで同一ユーザーとしてカウント）
    const getClientId = () => {
      let id = localStorage.getItem('min_tube_uid');
      if(!id) { id = crypto.randomUUID(); localStorage.setItem('min_tube_uid', id); }
      return id;
    };
    const uid = getClientId();

    const UI = {
      frame: $('gameFrame'), loading: $('loadingScreen'), error: $('errorScreen'),
      badge: $('liveBadge'), panel: $('sidePanel'), layout: $('layout'), topbar: $('topbar')
    };

    // ── 2. 同時接続数 (Presence) の設定 ──
    function setupPresence() {
      const channel = supabaseClient.channel('online-users', {
        config: { presence: { key: uid } }
      });

      channel
        .on('presence', { event: 'sync' }, () => {
          const state = channel.presenceState();
          const count = Object.keys(state).length;
          $('onlineCount').innerText = count;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await channel.track({ online_at: new Date().toISOString(), playing: gameKey });
          }
        });
    }

    // UIの表示制御
    const showUI = () => {
      UI.layout.classList.remove('hide-ui');
      clearTimeout(uiTimer);
      uiTimer = setTimeout(() => {
        if (!UI.panel.classList.contains('open') && !UI.topbar.matches(':hover')) {
          UI.layout.classList.add('hide-ui');
        }
      }, 3000);
    };

    window.addEventListener('mousemove', showUI);
    window.addEventListener('touchstart', showUI);

    async function loadGame() {
      try {
        UI.error.classList.remove('show');
        UI.loading.classList.remove('hidden');
        const res = await fetch('games.json');
        const games = await res.json();
        currentGame = games.find(g => g.key === gameKey);
        if (!currentGame) throw new Error('ゲームが見つかりません');

        document.title = `${currentGame.name} — MIN-Tube-Pro`;
        $('gameName').textContent = currentGame.name;
        $('gameEmoji').textContent = currentGame.emoji;
        $('loadingGameName').textContent = currentGame.name;
        $('panelBody').innerHTML = `
          <div><div class="info-label">説明</div><div>${currentGame.desc}</div></div>
          <div><div class="info-label">タグ</div><div>${currentGame.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div></div>
        `;

        UI.frame.onload = () => { 
          UI.loading.classList.add('hidden'); 
          UI.badge.style.display = 'flex'; 
        };
        UI.frame.src = currentGame.file;
        
        // Presence開始
        setupPresence();
        
      } catch (err) {
        UI.loading.classList.add('hidden');
        UI.error.classList.add('show');
        $('errorMsg').textContent = err.message;
      }
    }

    const retryAction = () => {
      if (currentGame) {
        UI.error.classList.remove('show');
        UI.loading.classList.remove('hidden');
        UI.frame.src = ''; 
        setTimeout(() => { UI.frame.src = currentGame.file; }, 50);
      } else loadGame();
    };

    $('reloadBtn').onclick = retryAction;
    $('retryBtn').onclick = retryAction;
    $('fsBtn').onclick = () => {
      if (!document.fullscreenElement) UI.layout.requestFullscreen?.();
      else document.exitFullscreen?.();
    };

    document.onfullscreenchange = () => {
      UI.layout.classList.toggle('is-fullscreen', !!document.fullscreenElement);
    };

    $('sideToggle').onclick = () => UI.panel.classList.toggle('open');
    $('panelClose').onclick = () => UI.panel.classList.remove('open');

    loadGame();
    showUI();
  </script>
</body>
</html>
