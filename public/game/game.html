<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Games — MIN-Tube-Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#0f1724; --bg2:#071029; --accent:#00d4ff;
      --glass:rgba(255,255,255,0.06); --card:rgba(255,255,255,0.03);
      --glass-border:rgba(255,255,255,0.08); --radius:14px;
      --glass-blur:10px; --text:#e6f7ff; --muted:#9fb7c9;
      --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
      --live: #4ade80;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:"Noto Sans JP",sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);-webkit-font-smoothing:antialiased}

    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 60px;gap:24px}
    .inner{width:100%;max-width:1100px}

    /* 戻るボタン */
    .back-btn{
      display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;text-decoration:none;
      padding:7px 14px;border-radius:8px;border:1px solid var(--glass-border);background:var(--card);transition:all .18s;cursor:pointer;
    }
    .back-btn:hover{color:var(--accent);background:rgba(0,212,255,0.07)}

    /* ヒーロー */
    .hero{
      display:flex;align-items:center;justify-content:space-between;gap:20px;
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
      border-radius:var(--radius);padding:22px;border:1px solid var(--glass-border);
      backdrop-filter:blur(var(--glass-blur));box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }
    .brand{display:flex;align-items:center;gap:14px}
    .logo-icon{
      width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      font-size:32px;background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
      border:1px solid var(--glass-border);box-shadow:0 6px 18px rgba(0,0,0,0.5);
    }
    .tagline{font-size:14px;color:var(--accent);display:flex;align-items:center;gap:8px;margin-top:4px}
    .spark{width:8px;height:8px;border-radius:50%;background:#00d4ff;box-shadow:0 0 10px #00d4ff;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(0.8);opacity:0.5}50%{transform:scale(1.2);opacity:1}}

    /* 同時接続バッジ */
    .live-count-wrap {
      display: flex; align-items: center; gap: 8px;
      background: rgba(74, 222, 128, 0.1); color: var(--live);
      padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(74, 222, 128, 0.2);
      font-size: 13px; font-weight: 700;
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--live); border-radius: 50%;
      box-shadow: 0 0 10px var(--live); animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ツールバー */
    .toolbar{display:flex;flex-direction:column;gap:12px}
    .search-wrap{position:relative}
    #searchInput{
      width:100%;padding:12px 16px 12px 42px;background:var(--card);border:1px solid var(--glass-border);
      border-radius:10px;color:var(--text);outline:none;font-family:inherit;
    }
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;stroke:var(--muted);fill:none;stroke-width:2}

    .filter-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .filter-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .filter-tab{
      padding:7px 15px;border-radius:20px;border:1px solid var(--glass-border);
      background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;
    }
    .filter-tab.active{background:rgba(0,212,255,0.15);color:var(--accent);border-color:var(--accent)}

    .sort-wrap{display:flex;align-items:center;gap:8px}
    #sortSelect{background:var(--card);color:var(--text);border:1px solid var(--glass-border);padding:6px 10px;border-radius:8px;outline:none;cursor:pointer}
    .view-toggle{display:flex;gap:4px}
    .view-btn{width:36px;height:34px;background:var(--card);border:1px solid var(--glass-border);border-radius:8px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .view-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,0.1)}

    /* グリッド */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .grid.list-view{display:flex;flex-direction:column}

    /* ゲームカード */
    .game-card{
      background:var(--card);border:1px solid var(--glass-border);border-radius:12px;
      overflow:hidden;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);cursor:pointer;display:flex;flex-direction:column;position:relative;
    }
    .game-card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 10px 30px rgba(0,0,0,0.4)}

    /* ランク演出 */
    .rank-tag{
      position:absolute;top:0;left:10px;z-index:10;width:32px;height:40px;
      display:none;align-items:center;justify-content:center;font-size:20px;
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%);
      font-weight: bold;box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .rank-1 .rank-tag{display:flex; background:linear-gradient(to bottom, #fff38a, var(--gold)); color:#725a00;}
    .rank-2 .rank-tag{display:flex; background:linear-gradient(to bottom, #e0e0e0, var(--silver)); color:#333;}
    .rank-3 .rank-tag{display:flex; background:linear-gradient(to bottom, #f3ad8a, var(--bronze)); color:#522a15;}
    
    .rank-1 { border-color: rgba(255, 215, 0, 0.4); }

    .thumb{position:relative;height:145px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .big-icon{font-size:55px;transition:transform .3s}
    .game-card:hover .big-icon{transform:scale(1.1) rotate(-3deg)}
    
    .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:0.2s;backdrop-filter:blur(2px)}
    .game-card:hover .play-overlay{opacity:1}
    .play-btn{width:54px;height:54px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-size:22px;box-shadow:0 0 20px var(--accent)}

    .card-body{padding:16px;display:flex;flex-direction:column;gap:8px;flex:1}
    .card-title-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .card-title{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .play-count{font-size:11px;background:rgba(0,212,255,0.1);padding:3px 8px;border-radius:10px;color:var(--accent);font-weight:bold;border:1px solid rgba(0,212,255,0.2);white-space:nowrap}
    
    .card-desc{font-size:13px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em}
    
    .card-footer{margin-top:auto;padding-top:10px;border-top:1px solid var(--glass-border);display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
    
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
    .status-dot.done{background:#22c55e;box-shadow:0 0 8px #22c55e}

    /* リストビュー調整 */
    .grid.list-view .game-card{flex-direction:row;height:90px}
    .grid.list-view .thumb{width:140px;height:90px}
    .grid.list-view .card-desc{display:none}
    .grid.list-view .rank-tag{height:30px;width:24px;font-size:14px}

    .count-bar{font-size:13px;color:var(--muted)}
    .count-bar span{color:var(--accent);font-weight:bold}
  </style>
</head>
<body>

  <div class="wrap">
    <div class="inner">
      <a href="/" class="back-btn">← ホームへ戻る</a>
    </div>

    <header class="hero inner">
      <div class="brand">
        <div class="logo-icon">🎮</div>
        <div>
          <div class="title">MIN-Tube-Pro Ranking</div>
          <div class="tagline"><div class="spark"></div>リアルタイム・人気ランキング</div>
        </div>
      </div>
      <!-- 同時接続数表示 -->
      <div class="live-count-wrap" title="現在このページを見ているユーザー数">
        <div class="live-dot"></div>
        LIVE: <span id="onlineCount">1</span> users
      </div>
    </header>

    <div class="toolbar inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="タイトル、タグで検索...">
      </div>
      <div class="filter-row">
        <nav class="filter-tabs" id="genreTabs">
          <button class="filter-tab active" data-genre="all">すべて</button>
          <button class="filter-tab" data-genre="action">アクション</button>
          <button class="filter-tab" data-genre="arcade">アーケード</button>
          <button class="filter-tab" data-genre="puzzle">パズル</button>
          <button class="filter-tab" data-genre="strategy">戦略</button>
          <button class="filter-tab" data-genre="horror">ホラー</button>
        </nav>
        <div class="sort-wrap">
          <select id="sortSelect">
            <option value="popular">🔥 人気ランキング順</option>
            <option value="name-asc">名前順 (A-Z)</option>
            <option value="name-desc">名前順 (Z-A)</option>
          </select>
          <div class="view-toggle">
            <button class="view-btn active" id="btnGrid">田</button>
            <button class="view-btn" id="btnList">目</button>
          </div>
        </div>
      </div>
    </div>

    <div class="inner count-bar" id="countBar">読み込み中...</div>
    <section class="grid inner" id="gameGrid"></section>
  </div>

  <script>
    // ── 1. 設定 ──
    const SUPABASE_URL = 'https://vddbnttozxrvhjyzqgps.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkZGJudHRvenhydmhqeXpxZ3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDczMjgsImV4cCI6MjA5NDg4MzMyOH0.XgN7PLFpstChezT_uoE06D3I4Yki6zMnKsI245smyPQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = id => document.getElementById(id);
    let allGames = [];
    let gameStats = {}; 
    let activeGenre = 'all';
    let activeSort = 'popular';
    let activeSearch = '';

    // UUID取得
    const getClientId = () => {
      let id = localStorage.getItem('min_tube_uid');
      if(!id) { id = crypto.randomUUID(); localStorage.setItem('min_tube_uid', id); }
      return id;
    };
    const uid = getClientId();

    // ── 2. データ取得 & リアルタイム設定 ──
    async function init() {
      try {
        const res = await fetch('games.json');
        allGames = await res.json();

        // 初回ランキング数値取得
        const { data: stats } = await supabaseClient.from('game_rankings').select('game_key, play_count');
        stats?.forEach(s => gameStats[s.game_key] = parseInt(s.play_count));

        render();
        setupRealtime();
        setupPresence(); // 同時接続数監視
      } catch (e) {
        console.error(e);
      }
    }

    // ランキング数値のリアルタイム監視
    function setupRealtime() {
      supabaseClient
        .channel('db_changes')
        .on('postgres_changes', { event: '*', table: 'game_rankings' }, payload => {
          const { game_key, play_count } = payload.new;
          gameStats[game_key] = parseInt(play_count);
          const badge = $(`count-${game_key}`);
          if(badge) badge.innerText = `${play_count} plays`;
          if(activeSort === 'popular') debounceRender();
        })
        .subscribe();
    }

    // ── 3. 同時接続数 (Presence) ──
    function setupPresence() {
      const channel = supabaseClient.channel('online-users', {
        config: { presence: { key: uid } }
      });

      channel
        .on('presence', { event: 'sync' }, () => {
          const state = channel.presenceState();
          const count = Object.keys(state).length; // ユニークなUUIDの数
          $('onlineCount').innerText = count;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await channel.track({ online_at: new Date().toISOString() });
          }
        });
    }

    // ── 4. プレイ処理 ──
    async function play(key) {
      await supabaseClient.rpc('increment_game_play', { 
        target_game_key: key, 
        user_uuid: uid 
      });
      window.location.href = `play.html?game=${key}`;
    }

    // ── 5. メイン描画 ──
    function render() {
      const grid = $('gameGrid');
      const query = activeSearch.toLowerCase();

      let filtered = allGames.filter(g => {
        const matchGenre = activeGenre === 'all' || g.genre === activeGenre;
        const matchSearch = g.name.toLowerCase().includes(query) || (g.tags && g.tags.some(t => t.toLowerCase().includes(query)));
        return matchGenre && matchSearch;
      });

      filtered.sort((a, b) => {
        if(activeSort === 'popular') {
          const countA = gameStats[a.key] || 0;
          const countB = gameStats[b.key] || 0;
          if (countB !== countA) return countB - countA;
          return a.name.localeCompare(b.name, 'ja', {numeric: true});
        }
        if(activeSort === 'name-asc') return a.name.localeCompare(b.name, 'ja', {numeric: true});
        return b.name.localeCompare(na,'ja', {numeric: true});
      });

      grid.innerHTML = '';
      filtered.forEach((g, index) => {
        const count = gameStats[g.key] || 0;
        const card = document.createElement('article');
        
        let rankClass = '';
        let medal = '';
        if (activeSort === 'popular') {
          if (index === 0) { rankClass = 'rank-1'; medal = '1'; }
          else if (index === 1) { rankClass = 'rank-2'; medal = '2'; }
          else if (index === 2) { rankClass = 'rank-3'; medal = '3'; }
        }

        card.className = `game-card ${rankClass}`;
        card.innerHTML = `
          <div class="rank-tag">${medal}</div>
          <div class="thumb">
            ${g.image ? `<img src="${g.image}" loading="lazy">` : `<div class="big-icon">${g.emoji}</div>`}
            <div class="play-overlay"><div class="play-btn">▶</div></div>
          </div>
          <div class="card-body">
            <div class="card-title-row">
              <span class="card-title">${g.name}</span>
              <span class="play-count" id="count-${g.key}">${count} plays</span>
            </div>
            <div class="card-desc">${g.desc}</div>
            <div class="card-footer">
              <span><span class="status-dot done"></span>${g.genreLabel}</span>
              <span>👤 ${g.players}</span>
            </div>
          </div>
        `;
        card.onclick = () => play(g.key);
        grid.appendChild(card);
      });

      $('countBar').innerHTML = `<span>${filtered.length}</span> 件のゲーム`;
    }

    // ── 6. イベント制御 ──
    let timer;
    const debounceRender = () => { clearTimeout(timer); timer = setTimeout(render, 1000); };

    $('searchInput').oninput = (e) => { activeSearch = e.target.value; render(); };
    $('sortSelect').onchange = (e) => { activeSort = e.target.value; render(); };
    
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        activeGenre = btn.dataset.genre;
        render();
      };
    });

    $('btnGrid').onclick = () => { $('gameGrid').classList.remove('list-view'); $('btnGrid').classList.add('active'); $('btnList').classList.remove('active'); };
    $('btnList').onclick = () => { $('gameGrid').classList.add('list-view'); $('btnList').classList.add('active'); $('btnGrid').classList.remove('active'); };

    init();
  </script>
</body>
</html>
